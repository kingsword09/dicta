name: test

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "LICENSE.*"
  pull_request:
    paths-ignore:
      - "*.md"
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "LICENSE.*"
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "600"
      CARGO_NET_RETRY: "10"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: windows-latest
          - os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Fetch Rust dependencies
        run: cargo fetch --locked

      - name: Test
        run: cargo test --workspace --locked

      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --all --check

  apple-speech-adapter:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Show toolchain
        run: |
          sw_vers
          xcode-select -p
          swift --version

      - name: Build Apple Speech adapter
        run: ./scripts/build-apple-speech-adapter.sh

      - name: Test Apple Speech adapter
        run: ./scripts/test-apple-speech-adapter.sh
