name: tagpr

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tagpr:
    runs-on: ubuntu-latest
    outputs:
      tagpr-tag: ${{ steps.run-tagpr.outputs.tag }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: run-tagpr
        name: Run tagpr
        uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assets:
    needs: tagpr
    if: needs.tagpr.outputs.tagpr-tag != ''
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_suffix: linux_x86_64
            bin: target/release/vo
            exe_name: vo
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            archive_suffix: linux_arm64
            bin: target/release/vo
            exe_name: vo
            archive_ext: tar.gz
          - os: macos-26
            archive_suffix: darwin_arm64
            bin: target/release/vo
            exe_name: vo
            archive_ext: tar.gz
          - os: windows-latest
            archive_suffix: windows_x86_64
            bin: target/release/vo.exe
            exe_name: vo.exe
            archive_ext: zip
          - os: windows-11-arm
            archive_suffix: windows_arm64
            bin: target/release/vo.exe
            exe_name: vo.exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tagpr.outputs.tagpr-tag }}
          fetch-depth: 0

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build release binary
        run: cargo build --release -p vo-cli

      - name: Build Apple Swift adapter
        if: matrix.archive_suffix == 'darwin_arm64'
        run: ./scripts/build-apple-swift-adapter.sh

      - name: Package archive
        id: pkg
        run: |
          TAG="${{ needs.tagpr.outputs.tagpr-tag }}"
          VERSION="${TAG#v}"
          BIN="${{ matrix.bin }}"
          STAGE="$(mktemp -d)"
          cp "$BIN" "$STAGE/${{ matrix.exe_name }}"
          if [ "${{ matrix.archive_suffix }}" = "darwin_arm64" ]; then
            ADAPTER_BIN="$(cd legacy/apple-swift-adapter && swift build -c release --arch arm64 --show-bin-path)/vo"
            cp "$ADAPTER_BIN" "$STAGE/vo-apple-adapter"
          fi
          cp LICENSE README.md "$STAGE/"
          ARCHIVE="vo_v${VERSION}_${{ matrix.archive_suffix }}.${{ matrix.archive_ext }}"
          LATEST_ARCHIVE="vo_${{ matrix.archive_suffix }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a "$ARCHIVE" "$STAGE"/*
            cp "$ARCHIVE" "$LATEST_ARCHIVE"
          else
            tar -C "$STAGE" -czf "$ARCHIVE" .
            cp "$ARCHIVE" "$LATEST_ARCHIVE"
          fi
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "latest_archive=${LATEST_ARCHIVE}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.tagpr.outputs.tagpr-tag }}" \
            "${{ steps.pkg.outputs.archive }}" \
            "${{ steps.pkg.outputs.latest_archive }}" \
            --clobber
        shell: bash

  release:
    needs: [tagpr, assets]
    if: needs.tagpr.outputs.tagpr-tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name=${{ needs.tagpr.outputs.tagpr-tag }} --jq .body \
            | gh release edit ${{ needs.tagpr.outputs.tagpr-tag }} \
                --repo ${{ github.repository }} \
                --draft=false --latest --notes-file=-
