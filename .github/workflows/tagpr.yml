name: tagpr

on:
  workflow_run:
    workflows:
      - test
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

jobs:
  tagpr:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      tagpr-tag: ${{ steps.run-tagpr.outputs.tag }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
      - id: run-tagpr
        name: Run tagpr
        uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assets:
    needs: tagpr
    if: needs.tagpr.outputs.tagpr-tag != ''
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "600"
      CARGO_NET_RETRY: "10"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_suffix: linux_x86_64
            bin: target/release/dicta
            tray_bin: target/release/dicta-tray
            exe_name: dicta
            tray_exe_name: dicta-tray
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            archive_suffix: linux_arm64
            bin: target/release/dicta
            tray_bin: target/release/dicta-tray
            exe_name: dicta
            tray_exe_name: dicta-tray
            archive_ext: tar.gz
          - os: macos-15
            archive_suffix: darwin_arm64
            bin: target/release/dicta
            tray_bin: target/release/dicta-tray
            exe_name: dicta
            tray_exe_name: dicta-tray
            archive_ext: tar.gz
          - os: windows-latest
            archive_suffix: windows_x86_64
            bin: target/release/dicta.exe
            tray_bin: target/release/dicta-tray.exe
            exe_name: dicta.exe
            tray_exe_name: dicta-tray.exe
            archive_ext: zip
          - os: windows-11-arm
            archive_suffix: windows_arm64
            bin: target/release/dicta.exe
            tray_bin: target/release/dicta-tray.exe
            exe_name: dicta.exe
            tray_exe_name: dicta-tray.exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.tagpr.outputs.tagpr-tag }}
          fetch-depth: 0

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgtk-3-dev libxdo-dev libayatana-appindicator3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Fetch Rust dependencies
        run: cargo fetch --locked

      - name: Build macOS release binary
        if: matrix.archive_suffix == 'darwin_arm64'
        env:
          MACOSX_DEPLOYMENT_TARGET: "15.0"
        run: cargo build --release -p dicta-cli -p dicta-tray --locked

      - name: Build release binary
        if: matrix.archive_suffix != 'darwin_arm64'
        run: cargo build --release -p dicta-cli -p dicta-tray --locked

      - name: Verify macOS release compatibility metadata
        if: matrix.archive_suffix == 'darwin_arm64'
        run: |
          ./target/release/dicta --version
          file target/release/dicta target/release/dicta-tray
          otool -l target/release/dicta | grep -A4 LC_BUILD_VERSION
          otool -l target/release/dicta-tray | grep -A4 LC_BUILD_VERSION

      - name: Select Xcode 26 for Apple Speech adapter
        if: matrix.archive_suffix == 'darwin_arm64'
        run: |
          XCODE_26="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -n 1)"
          if [ "$XCODE_26" = "" ]; then
            echo "Xcode 26 is required to build the Apple Speech adapter" >&2
            exit 1
          fi
          sudo xcode-select -s "$XCODE_26"
          xcodebuild -version

      - name: Build Apple Speech adapter
        if: matrix.archive_suffix == 'darwin_arm64'
        run: ./scripts/build-apple-speech-adapter.sh

      - name: Package archive
        id: pkg
        run: |
          BIN="${{ matrix.bin }}"
          TRAY_BIN="${{ matrix.tray_bin }}"
          STAGE="$(mktemp -d)"
          cp "$BIN" "$STAGE/${{ matrix.exe_name }}"
          cp "$TRAY_BIN" "$STAGE/${{ matrix.tray_exe_name }}"
          if [ "${{ matrix.archive_suffix }}" = "darwin_arm64" ]; then
            ADAPTER_BIN="$(cd adapters/apple-speech && swift build -c release --arch arm64 --show-bin-path)/dicta-adapter-apple-speech"
            cp "$ADAPTER_BIN" "$STAGE/dicta-adapter-apple-speech"
          fi
          cp LICENSE README.md "$STAGE/"
          ARCHIVE="dicta_${{ matrix.archive_suffix }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            7z a "$ARCHIVE" "$STAGE"/*
          else
            tar -C "$STAGE" -czf "$ARCHIVE" .
          fi
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.tagpr.outputs.tagpr-tag }}" \
            "${{ steps.pkg.outputs.archive }}" \
            --clobber
        shell: bash

  release:
    needs: [tagpr, assets]
    if: needs.tagpr.outputs.tagpr-tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api /repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name=${{ needs.tagpr.outputs.tagpr-tag }} --jq .body \
            | gh release edit ${{ needs.tagpr.outputs.tagpr-tag }} \
                --repo ${{ github.repository }} \
                --draft=false --latest --notes-file=-
